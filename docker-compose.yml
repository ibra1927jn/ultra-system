# ╔══════════════════════════════════════════════════════════════╗
# ║  ULTRA SYSTEM — Docker Compose                              ║
# ║                                                              ║
# ║  🚀 DE 8 CONTENEDORES → 2                                  ║
# ║  0 herramientas de terceros · 100% código propio            ║
# ║                                                              ║
# ║  Servidor: Hetzner CX23 (2vCPU, 4GB RAM, 40GB)             ║
# ╚══════════════════════════════════════════════════════════════╝

services:

  # ─── BASE DE DATOS (única dependencia externa) ────────────
  db:
    image: postgres:16-alpine
    container_name: ultra_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ultra_net

  # ─── ULTRA ENGINE (todo lo demás en uno) ──────────────────
  # Reemplaza: n8n, Paperless-ngx, Miniflux, Changedetection,
  #            Playwright, Grafana, Homepage, Redis
  engine:
    build: ./ultra-engine
    container_name: ultra_engine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-not_configured}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-not_configured}
      TZ: ${TZ}
      PORT: 3000
      API_KEY: ${API_KEY}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-}
      CDIO_API_KEY: ${CDIO_API_KEY:-}
      CDIO_BASE_URL: http://changedetection:5000
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      PAPERLESS_BASE_URL: http://paperless:8000
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER:-admin}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD:-changeme}
      OSRM_BASE_URL: http://osrm:5000
      SPACY_BASE_URL: http://spacy:8000
      PUPPETEER_BASE_URL: http://puppeteer:3000
      FIREFLY_BASE_URL: http://firefly_iii:8080
      FIREFLY_PERSONAL_TOKEN: ${FIREFLY_PERSONAL_TOKEN:-}
    volumes:
      - engine_uploads:/app/uploads
      - /root/ultra-system/agent_bus.json:/data/agent_bus.json
    networks:
      - ultra_net

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  P7 BIO-CHECK — 4 self-hosted services (Opción B)
  #  Decisión usuario 2026-04-07
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  # ─── wger: fitness tracker (Django + Vue) ─────────────────
  # API completa: 896 ejercicios, 15 músculos, 11 equipment
  wger:
    image: wger/server:latest
    container_name: ultra_wger
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      SECRET_KEY: ${WGER_SECRET_KEY:-change-me-please-with-random-string}
      SIGNING_KEY: ${WGER_SIGNING_KEY:-change-me-please-with-random-string-2}
      DJANGO_DEBUG: "False"
      ALLOW_REGISTRATION: "False"
      ALLOW_GUEST_USERS: "True"
      WGER_INSTANCE: https://wger.local
      TIME_ZONE: ${TZ:-Pacific/Auckland}
      X_FORWARDED_PROTO_HEADER_SET: "True"
      CSRF_TRUSTED_ORIGINS: "http://localhost:8001"
    volumes:
      - wger_static:/home/wger/static
      - wger_media:/home/wger/media
      - wger_db:/db
    networks:
      - ultra_net

  # ─── mealie: recetas + meal planning (FastAPI + Vue) ──────
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: ultra_mealie
    restart: unless-stopped
    ports:
      - "8002:9000"
    environment:
      ALLOW_SIGNUP: "false"
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ:-Pacific/Auckland}
      MAX_WORKERS: "1"
      WEB_CONCURRENCY: "1"
      BASE_URL: http://localhost:8002
    volumes:
      - mealie_data:/app/data/
    networks:
      - ultra_net
    deploy:
      resources:
        limits:
          memory: 1000M

  # ─── grocy: despensa van + expiry + shopping list (PHP) ───
  grocy:
    image: lscr.io/linuxserver/grocy:latest
    container_name: ultra_grocy
    restart: unless-stopped
    ports:
      - "8003:80"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ:-Pacific/Auckland}
    volumes:
      - grocy_data:/config
    networks:
      - ultra_net

  # ─── fasten-onprem: personal health record vault (Go) ─────
  fasten:
    image: ghcr.io/fastenhealth/fasten-onprem:main
    container_name: ultra_fasten
    restart: unless-stopped
    ports:
      - "8004:8080"
    volumes:
      - fasten_data:/opt/fasten/db
      - fasten_cache:/opt/fasten/cache
    networks:
      - ultra_net

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  P2 EMPLEO — JobSpy Python sidecar
  #  rainmanjam/jobspy-api: REST wrapper sobre python-jobspy
  #  Cubre LinkedIn/Indeed/Glassdoor/Google/ZipRecruiter/Bayt/BDJobs
  #  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  jobspy:
    image: rainmanjam/jobspy-api:latest
    container_name: ultra_jobspy
    restart: unless-stopped
    ports:
      - "8005:8000"
    environment:
      API_KEY: ${JOBSPY_API_KEY:-}
      ENABLE_API_KEY_AUTH: "false"
      RATE_LIMIT_ENABLED: "true"
      LOG_LEVEL: INFO
      TZ: ${TZ:-Pacific/Auckland}
    networks:
      - ultra_net

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  P4 FASE 2 — changedetection.io
  #  Watch páginas gov inmigración/visa críticas. Webhook
  #  → engine /api/bureaucracy/changedetection/webhook → Telegram
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  P4 FASE 2 — Paperless-ngx (document vault + OCR)
  #  Bridge con bur_documents via paperless_id (ya existe FK col).
  #  Redis broker minimal (alpine 30MB), sqlite por defecto.
  #  paperless-ai DEFERIDO — requiere OPENAI_API_KEY o Ollama
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  paperless-redis:
    image: redis:7-alpine
    container_name: ultra_paperless_redis
    restart: unless-stopped
    networks:
      - ultra_net

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: ultra_paperless
    restart: unless-stopped
    depends_on:
      - paperless-redis
    ports:
      - "8007:8000"
    environment:
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBENGINE: sqlite
      PAPERLESS_URL: http://localhost:8007
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY:-change-me-please-change-me-please}
      PAPERLESS_TIME_ZONE: ${TZ:-Pacific/Auckland}
      PAPERLESS_OCR_LANGUAGES: spa eng fra ara
      PAPERLESS_OCR_LANGUAGE: eng+spa+fra
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER:-admin}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD:-changeme}
      USERMAP_UID: "1000"
      USERMAP_GID: "1000"
    volumes:
      - ./paperless/data:/usr/src/paperless/data
      - ./paperless/media:/usr/src/paperless/media
      - ./paperless/consume:/usr/src/paperless/consume
      - paperless_export:/usr/src/paperless/export
    networks:
      - ultra_net
    deploy:
      resources:
        limits:
          memory: 1500M

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  P6 FASE 2 — Traccar GPS server
  #  Usa SQLite por defecto (h2 en versión legacy, sqlite en
  #  recientes). Phone apps Traccar Client envían pings vía
  #  protocolo osmand al puerto 5055.
  #  Web UI en 8082, REST API también en 8082.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  P6 FASE 3c — Self-hosted OSRM-NZ
  #  Pre-procesado: nz-latest.osm.pbf → extract+partition+customize
  #  Algoritmo MLD (Multi-Level Dijkstra) — más rápido + menos RAM
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  osrm:
    image: osrm/osrm-backend:latest
    container_name: ultra_osrm
    restart: unless-stopped
    command: osrm-routed --algorithm mld /data/nz-latest.osrm
    volumes:
      - ./osrm/data:/data:ro
    ports:
      - "5001:5000"
    networks:
      - ultra_net
    deploy:
      resources:
        limits:
          memory: 1500M

  traccar:
    image: traccar/traccar:latest
    container_name: ultra_traccar
    restart: unless-stopped
    ports:
      - "8082:8082"          # Web UI + REST API
      - "5055:5055"          # OsmAnd protocol (Traccar Client app)
    volumes:
      - traccar_data:/opt/traccar/data
      - traccar_logs:/opt/traccar/logs
    networks:
      - ultra_net
    deploy:
      resources:
        limits:
          memory: 600M

  changedetection:
    image: ghcr.io/dgtlmoon/changedetection.io:latest
    container_name: ultra_changedetection
    restart: unless-stopped
    ports:
      - "8006:5000"
    environment:
      BASE_URL: http://localhost:8006
      PUID: "1000"
      PGID: "1000"
      TZ: ${TZ:-Pacific/Auckland}
    volumes:
      - changedetection_data:/datastore
    networks:
      - ultra_net
    deploy:
      resources:
        limits:
          memory: 400M

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  P1 NLP — spaCy NER sidecar
  #  Used opt-in for high-value content (high-score articles,
  #  opportunities, OCR'd documents). compromise.js sigue siendo
  #  el fast-path por defecto en nlp.js.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  spacy:
    build: ./spacy
    container_name: ultra_spacy
    restart: unless-stopped
    ports:
      - "8009:8000"
    networks:
      - ultra_net
    deploy:
      resources:
        limits:
          memory: 600M

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  Puppeteer sidecar (R5 P5/P6 — desbloquea SPAs)
  #  Profile gated. Activar:
  #    docker compose --profile puppeteer up -d puppeteer
  #  Usado por engine para Immunefi, Code4rena, Park4Night, etc.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  puppeteer:
    build: ./puppeteer-sidecar
    container_name: ultra_puppeteer
    restart: unless-stopped
    profiles: ["puppeteer"]
    ports:
      - "8010:3000"
    networks:
      - ultra_net
    # Chromium necesita SHM grande para tabs no triviales
    shm_size: 1gb
    deploy:
      resources:
        limits:
          memory: 1500M

  # ─── APPRISE — multi-channel notifications (P4 opcional) ────
  # Activar: docker compose --profile notify up -d apprise
  # Después: set APPRISE_URL=http://apprise:8000 en .env
  apprise:
    image: caronc/apprise:latest
    container_name: ultra_apprise
    restart: unless-stopped
    profiles: ["notify"]
    ports:
      - "8008:8000"
    environment:
      APPRISE_STATEFUL_MODE: simple
      APPRISE_CONFIG_LOCK: "no"
    volumes:
      - apprise_data:/config
    networks:
      - ultra_net
    deploy:
      resources:
        limits:
          memory: 200M

  # ─── n8n — workflow automation (P4 opcional) ────────────────
  # Activar: docker compose --profile automation up -d n8n
  # Acceso: http://localhost:5678
  n8n:
    image: n8nio/n8n:latest
    container_name: ultra_n8n
    restart: unless-stopped
    profiles: ["automation"]
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-changeme}
      TZ: ${TZ:-Pacific/Auckland}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - ultra_net
    deploy:
      resources:
        limits:
          memory: 800M

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  #  P3 — FIREFLY III ledger (decisión usuario 2026-04-07)
  #  Reemplaza progresivamente el ledger custom (`finances` table).
  #  Profile gated → no arranca por defecto. Activar:
  #    docker compose --profile firefly up -d firefly_iii
  #  Schema vive en database `firefly_db` dentro del PG existente.
  #  Acceso: http://localhost:8080
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  firefly_iii:
    image: fireflyiii/core:latest
    container_name: ultra_firefly
    restart: unless-stopped
    profiles: ["firefly"]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      APP_KEY: ${FIREFLY_APP_KEY}
      APP_URL: ${FIREFLY_APP_URL:-http://localhost:8080}
      TRUSTED_PROXIES: "**"
      TZ: ${TZ:-Pacific/Auckland}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: firefly_db
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_LANGUAGE: en_US
      DEFAULT_LOCALE: equal
      # Currency setup: el usuario está en NZ con WHV → primary NZD
      # Currency real se setea en el primer wizard, esto es solo locale.
      # Static token para que el migration script pueda llamar la API
      # sin pasar por OAuth flow. NO commitear el valor — sólo el var name.
      STATIC_CRON_TOKEN: ${FIREFLY_STATIC_TOKEN}
      # Disable telemetry
      SEND_TELEMETRY: "false"
      SEND_ERROR_MESSAGE: "false"
      SEND_LOGIN_NEW_IP_WARNING: "false"
      LOG_CHANNEL: stack
      APP_LOG_LEVEL: notice
    volumes:
      - firefly_upload:/var/www/html/storage/upload
    networks:
      - ultra_net
    deploy:
      resources:
        limits:
          memory: 400M

  # ─── Firefly III importer (Data Importer for CSV/Spectre/Nordigen)
  # Lo correremos puntualmente para importar histórico bancario una vez
  # que la base de Firefly esté configurada. Profile separado.
  firefly_importer:
    image: fireflyiii/data-importer:latest
    container_name: ultra_firefly_importer
    restart: unless-stopped
    profiles: ["firefly-importer"]
    depends_on:
      - firefly_iii
    ports:
      - "8081:8080"
    environment:
      APP_URL: http://localhost:8081
      FIREFLY_III_URL: http://firefly_iii:8080
      VANITY_URL: ${FIREFLY_APP_URL:-http://localhost:8080}
      FIREFLY_III_ACCESS_TOKEN: ${FIREFLY_PERSONAL_TOKEN:-}
      TZ: ${TZ:-Pacific/Auckland}
      TRUSTED_PROXIES: "**"
    networks:
      - ultra_net
    deploy:
      resources:
        limits:
          memory: 300M

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  VOLÚMENES PERSISTENTES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
volumes:
  postgres_data:
    driver: local
  engine_uploads:
    driver: local
  # P7 self-hosted services
  wger_static:
  wger_media:
  wger_db:
  mealie_data:
  grocy_data:
  fasten_data:
  fasten_cache:
  changedetection_data:
  paperless_export:
  traccar_data:
  traccar_logs:
  apprise_data:
  n8n_data:
  firefly_upload:

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  RED INTERNA
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
networks:
  ultra_net:
    driver: bridge
