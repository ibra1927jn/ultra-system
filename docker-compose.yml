# ╔══════════════════════════════════════════════════════════════╗
# ║  ULTRA SYSTEM — Docker Compose                              ║
# ║                                                              ║
# ║  🚀 DE 8 CONTENEDORES → 2                                  ║
# ║  0 herramientas de terceros · 100% código propio            ║
# ║                                                              ║
# ║  Servidor: Hetzner CX23 (2vCPU, 4GB RAM, 40GB)             ║
# ╚══════════════════════════════════════════════════════════════╝

services:

  # ─── BASE DE DATOS (única dependencia externa) ────────────
  db:
    image: postgres:16-alpine
    container_name: ultra_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ultra_net

  # ─── ULTRA ENGINE (todo lo demás en uno) ──────────────────
  # Reemplaza: n8n, Paperless-ngx, Miniflux, Changedetection,
  #            Playwright, Grafana, Homepage, Redis
  engine:
    build: ./ultra-engine
    container_name: ultra_engine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-not_configured}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-not_configured}
      API_KEY: ${API_KEY}
      TZ: ${TZ}
      PORT: 3000
    volumes:
      - engine_uploads:/app/uploads
    networks:
      - ultra_net

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  VOLÚMENES PERSISTENTES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
volumes:
  postgres_data:
    driver: local
  engine_uploads:
    driver: local

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  RED INTERNA
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
networks:
  ultra_net:
    driver: bridge
