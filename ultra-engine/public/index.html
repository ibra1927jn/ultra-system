<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRA SYSTEM — Mission Control</title>
    <meta name="description" content="Personal mission control dashboard for life management from the road.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
/* ═══════════════════════════════════════════════════
   DESIGN SYSTEM — Mission Control
   ═══════════════════════════════════════════════════ */
:root {
    --bg-deep: #0a0e1a;
    --bg-surface: rgba(255,255,255,0.03);
    --bg-surface-hover: rgba(255,255,255,0.06);
    --bg-elevated: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --text-primary: #e8ecf4;
    --text-secondary: #8892a8;
    --text-muted: #555f75;
    --accent-teal: #00d4aa;
    --accent-teal-dim: rgba(0,212,170,0.12);
    --accent-amber: #f59e0b;
    --accent-amber-dim: rgba(245,158,11,0.12);
    --accent-coral: #ef4444;
    --accent-coral-dim: rgba(239,68,68,0.12);
    --accent-blue: #3b82f6;
    --accent-blue-dim: rgba(59,130,246,0.12);
    --accent-purple: #a78bfa;
    --accent-purple-dim: rgba(167,139,250,0.12);
    --font-data: 'JetBrains Mono', monospace;
    --font-heading: 'Outfit', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
}

/* ─── Reset ─── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 14px; }
body {
    font-family: var(--font-body);
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
}
body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,212,170,0.06), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(59,130,246,0.04), transparent);
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }

/* ═══ HEADER ═══ */
.header {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: rgba(10,14,26,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.logo-mark {
    width: 34px; height: 34px; position: relative;
    display: flex; align-items: center; justify-content: center;
}
.logo-mark svg { width: 34px; height: 34px; }
.logo-text {
    font-family: var(--font-heading); font-weight: 800;
    font-size: 1.25rem; letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent-teal), var(--accent-blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-right { display: flex; align-items: center; gap: 16px; }

/* ─── Status Pills ─── */
.status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px;
    font-family: var(--font-data); font-size: 0.78rem; font-weight: 500;
    border: 1px solid transparent; white-space: nowrap;
}
.status-pill.ok { background: rgba(0,212,170,0.08); color: var(--accent-teal); border-color: rgba(0,212,170,0.2); }
.status-pill.warn { background: var(--accent-amber-dim); color: var(--accent-amber); border-color: rgba(245,158,11,0.2); }
.status-pill.danger { background: var(--accent-coral-dim); color: var(--accent-coral); border-color: rgba(239,68,68,0.2); }
.status-pill .dot {
    width: 7px; height: 7px; border-radius: 50%; background: currentColor;
    animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
    0%,100% { opacity:1; box-shadow: 0 0 0 0 currentColor; }
    50% { opacity:.7; box-shadow: 0 0 0 4px transparent; }
}

/* ═══ MAIN GRID ═══ */
.dashboard { max-width: 1440px; margin: 0 auto; padding: 24px 24px 48px; }
.grid-2col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}
.grid-full { grid-column: 1 / -1; }

/* ═══ CARD ═══ */
.card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: border-color 0.25s;
}
.card:hover { border-color: var(--border-hover); }
.card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
}
.card-header-left { display: flex; align-items: center; gap: 10px; }
.card-icon {
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
}
.card-icon svg { width: 18px; height: 18px; stroke-width: 2; }
.card-title {
    font-family: var(--font-heading); font-weight: 600;
    font-size: 0.95rem; color: var(--text-primary);
}
.card-header-right { display: flex; align-items: center; gap: 8px; }
.card-meta { font-family: var(--font-data); font-size: 0.72rem; color: var(--text-muted); }
.chevron {
    width: 18px; height: 18px; color: var(--text-muted);
    transition: transform 0.25s;
}
.card.collapsed .chevron { transform: rotate(-90deg); }
.card.collapsed .card-body { display: none; }
.card-body { padding: 16px 20px 20px; }

/* ═══ METRIC CARD ═══ */
.metric-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.metric-card {
    flex: 1; min-width: 100px;
    background: var(--bg-elevated); border-radius: var(--radius-md);
    padding: 12px 14px;
}
.metric-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
.metric-value { font-family: var(--font-data); font-size: 1.4rem; font-weight: 700; color: #fff; margin: 4px 0 2px; }
.metric-trend { font-family: var(--font-data); font-size: 0.72rem; font-weight: 500; }
.metric-trend.up { color: var(--accent-teal); }
.metric-trend.down { color: var(--accent-coral); }
.metric-trend.neutral { color: var(--text-muted); }

/* ═══ PROGRESS BAR ═══ */
.progress-item { margin-bottom: 10px; }
.progress-label-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
.progress-name { font-size: 0.82rem; color: var(--text-secondary); }
.progress-pct { font-family: var(--font-data); font-size: 0.75rem; color: var(--text-muted); }
.progress-track {
    width: 100%; height: 6px; border-radius: 3px;
    background: rgba(255,255,255,0.04);
}
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

/* ═══ LIST ITEMS ═══ */
.list-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
}
.list-item:last-child { border-bottom: none; }
.list-dot {
    width: 8px; height: 8px; border-radius: 50%;
    margin-top: 6px; flex-shrink: 0;
}
.list-content { flex: 1; min-width: 0; }
.list-title { font-size: 0.88rem; color: var(--text-primary); line-height: 1.4; }
.list-title .kw { color: var(--accent-teal); font-weight: 600; }
.list-sub { font-family: var(--font-data); font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }

/* ═══ TIMELINE ═══ */
.timeline { position: relative; padding-left: 20px; }
.timeline::before {
    content: ''; position: absolute; left: 5px; top: 8px; bottom: 8px;
    width: 1px; background: var(--border);
}
.timeline-item { position: relative; padding: 8px 0; display: flex; gap: 12px; }
.timeline-dot {
    position: absolute; left: -20px; top: 14px;
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid var(--accent-teal); background: var(--bg-deep);
}
.timeline-dot.urgent { border-color: var(--accent-coral); background: var(--accent-coral); }
.timeline-dot.warn { border-color: var(--accent-amber); }
.timeline-time { font-family: var(--font-data); font-size: 0.75rem; color: var(--text-muted); min-width: 44px; padding-top: 2px; }
.timeline-title { font-size: 0.85rem; color: var(--text-primary); }

/* ═══ KANBAN ═══ */
.kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.kanban-col-title {
    font-family: var(--font-data); font-size: 0.68rem; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; text-align: center;
}
.kanban-card {
    background: var(--bg-elevated); border-radius: var(--radius-sm);
    padding: 8px 10px; font-size: 0.78rem; color: var(--text-secondary);
    border-left: 2px solid var(--accent-teal); margin-bottom: 6px;
}

/* ═══ DOCUMENT CARD ═══ */
.doc-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    background: var(--bg-elevated); border-radius: var(--radius-md);
    margin-bottom: 8px;
}
.doc-icon { width: 32px; height: 32px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; }
.doc-info { flex: 1; min-width: 0; }
.doc-name { font-size: 0.85rem; font-weight: 500; }
.doc-type { font-size: 0.72rem; color: var(--text-muted); }
.doc-countdown { text-align: right; }
.doc-days { font-family: var(--font-data); font-size: 1.2rem; font-weight: 700; }
.doc-days-label { font-size: 0.65rem; color: var(--text-muted); }

/* ═══ TAB BAR ═══ */
.tab-bar { display: flex; gap: 4px; margin-bottom: 14px; }
.tab-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); padding: 5px 14px; border-radius: 20px;
    font-family: var(--font-data); font-size: 0.72rem; cursor: pointer;
    transition: all 0.2s;
}
.tab-btn.active, .tab-btn:hover {
    background: var(--accent-teal-dim); color: var(--accent-teal);
    border-color: rgba(0,212,170,0.25);
}

/* ═══ EMPTY STATE ═══ */
.empty-state {
    text-align: center; padding: 28px 16px;
    color: var(--text-muted); font-size: 0.85rem;
}
.empty-state svg { width: 32px; height: 32px; margin-bottom: 8px; opacity: 0.3; }

/* ═══ BUS PANEL ═══ */
.bus-task {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; background: var(--bg-elevated);
    border-radius: var(--radius-sm); margin-bottom: 6px;
}
.bus-agent { font-family: var(--font-data); font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.bus-agent.antigravity { background: var(--accent-purple-dim); color: var(--accent-purple); }
.bus-agent.claude-code { background: var(--accent-teal-dim); color: var(--accent-teal); }
.bus-agent.claude-chat { background: var(--accent-blue-dim); color: var(--accent-blue); }
.bus-summary { flex: 1; font-size: 0.8rem; color: var(--text-secondary); }
.bus-time { font-family: var(--font-data); font-size: 0.68rem; color: var(--text-muted); }

/* ═══ BUTTONS ═══ */
.btn-ghost {
    background: transparent; border: 1px dashed var(--border);
    color: var(--text-muted); padding: 6px 14px; border-radius: var(--radius-sm);
    font-family: var(--font-data); font-size: 0.72rem; cursor: pointer;
    transition: all 0.2s;
}
.btn-ghost:hover { border-color: var(--accent-teal); color: var(--accent-teal); }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 1200px) {
    .dashboard { padding: 16px; }
    .grid-2col { gap: 14px; }
}
@media (max-width: 768px) {
    .header { padding: 12px 16px; }
    .grid-2col { grid-template-columns: 1fr; }
    .kanban { grid-template-columns: repeat(2, 1fr); }
    .metric-row { flex-direction: column; }
    .header-right .status-pill span.hide-mobile { display: none; }
}
    </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="header">
    <div class="header-left">
        <div class="logo-mark">
            <svg viewBox="0 0 40 40" fill="none"><polygon points="20,2 37,11 37,29 20,38 3,29 3,11" stroke="url(#lg)" stroke-width="2" fill="rgba(0,212,170,0.06)"/><text x="20" y="25" text-anchor="middle" fill="url(#lg)" font-family="Outfit" font-weight="800" font-size="16">U</text><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00d4aa"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs></svg>
        </div>
        <span class="logo-text">ULTRA SYSTEM</span>
    </div>
    <div class="header-right">
        <div class="status-pill ok"><div class="dot"></div><span id="hdr-status">Active</span></div>
        <div class="status-pill ok" id="hdr-nz-time" style="color:var(--text-secondary);background:var(--bg-elevated);border-color:var(--border);">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            <span>--:--</span>
        </div>
        <div class="status-pill ok" id="hdr-bus">Bus: <span>0</span></div>
        <div class="status-pill ok" id="hdr-rss" style="color:var(--text-secondary);background:var(--bg-elevated);border-color:var(--border);">RSS: --</div>
    </div>
</header>

<!-- ═══ DASHBOARD GRID ═══ -->
<main class="dashboard">
    <div class="grid-2col" id="main-grid">

        <!-- ═══ P1: NOTICIAS ═══ -->
        <div class="card" id="card-news">
            <div class="card-header" onclick="toggleCard('card-news')">
                <div class="card-header-left">
                    <div class="card-icon" style="background:var(--accent-teal-dim)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-teal)" stroke-width="2"><path d="M4 22h16a2 2 0 002-2V4a2 2 0 00-2-2H8a2 2 0 00-2 2v16a2 2 0 01-2 2zm0 0a2 2 0 01-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8M15 18h-5M10 6h8v4h-8z"/></svg>
                    </div>
                    <span class="card-title">News Feed</span>
                </div>
                <div class="card-header-right">
                    <span class="card-meta" id="news-count">0 articles</span>
                    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                </div>
            </div>
            <div class="card-body">
                <div class="tab-bar" id="news-tabs">
                    <button class="tab-btn active" data-src="all">All</button>
                    <button class="tab-btn" data-src="hn">HN</button>
                    <button class="tab-btn" data-src="rnz">RNZ</button>
                    <button class="tab-btn" data-src="bbc">BBC</button>
                    <button class="tab-btn" data-src="nyt">NYT</button>
                </div>
                <div id="news-list"></div>
            </div>
        </div>

        <!-- ═══ P2: EMPLEO ═══ -->
        <div class="card" id="card-jobs">
            <div class="card-header" onclick="toggleCard('card-jobs')">
                <div class="card-header-left">
                    <div class="card-icon" style="background:var(--accent-blue-dim)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
                    </div>
                    <span class="card-title">Employment</span>
                </div>
                <div class="card-header-right">
                    <span class="card-meta" id="jobs-count">0 active</span>
                    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                </div>
            </div>
            <div class="card-body">
                <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;" id="jobs-tabs">
                    <button class="tab-btn active" onclick="filterJobs('all')">All</button>
                    <button class="tab-btn" onclick="filterJobs('warehouse')">Warehouse</button>
                    <button class="tab-btn" onclick="filterJobs('tech')">Tech</button>
                    <button class="tab-btn" onclick="filterJobs('hospitality')">Hospitality</button>
                    <button class="tab-btn" onclick="filterJobs('construction')">Construction</button>
                    <button class="tab-btn" onclick="filterJobs('logistics')">Logistics</button>
                </div>
                <div style="display:flex;gap:6px;margin-bottom:12px;">
                    <input type="text" id="jobs-search" placeholder="Search jobs..." style="flex:1;padding:6px 10px;background:var(--bg-card);border:1px solid var(--border-glass);border-radius:6px;color:var(--text-primary);font-size:0.8rem;">
                    <button class="tab-btn" onclick="searchJobs()" style="white-space:nowrap;">Search</button>
                </div>
                <div id="jobs-list"></div>
            </div>
        </div>

        <!-- ═══ P3: FINANZAS ═══ -->
        <div class="card" id="card-finance">
            <div class="card-header" onclick="toggleCard('card-finance')">
                <div class="card-header-left">
                    <div class="card-icon" style="background:rgba(16,185,129,0.12)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                    </div>
                    <span class="card-title">Finances</span>
                </div>
                <div class="card-header-right">
                    <span class="card-meta" id="finance-balance">--</span>
                    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                </div>
            </div>
            <div class="card-body">
                <div class="metric-row" id="finance-metrics"></div>
                <div id="budget-bars"></div>
                <div id="recent-expenses" style="margin-top:14px;"></div>
            </div>
        </div>

        <!-- ═══ P4: DOCUMENTOS ═══ -->
        <div class="card" id="card-docs">
            <div class="card-header" onclick="toggleCard('card-docs')">
                <div class="card-header-left">
                    <div class="card-icon" style="background:rgba(245,158,11,0.12)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-amber)" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
                    </div>
                    <span class="card-title">Documents</span>
                </div>
                <div class="card-header-right">
                    <span class="card-meta" id="docs-count">0 tracked</span>
                    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                </div>
            </div>
            <div class="card-body" id="docs-list"></div>
        </div>

        <!-- ═══ P5: LOGÍSTICA ═══ -->
        <div class="card" id="card-logistics">
            <div class="card-header" onclick="toggleCard('card-logistics')">
                <div class="card-header-left">
                    <div class="card-icon" style="background:rgba(168,85,247,0.12)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    </div>
                    <span class="card-title">Logistics</span>
                </div>
                <div class="card-header-right">
                    <span class="card-meta">Next 48h</span>
                    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                </div>
            </div>
            <div class="card-body">
                <div class="timeline" id="logistics-timeline"></div>
            </div>
        </div>

        <!-- ═══ P6: OPORTUNIDADES ═══ -->
        <div class="card" id="card-opps">
            <div class="card-header" onclick="toggleCard('card-opps')">
                <div class="card-header-left">
                    <div class="card-icon" style="background:rgba(236,72,153,0.12)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    </div>
                    <span class="card-title">Opportunities</span>
                </div>
                <div class="card-header-right">
                    <span class="card-meta" id="opps-count">0 pipeline</span>
                    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                </div>
            </div>
            <div class="card-body">
                <div class="kanban" id="opps-kanban">
                    <div><div class="kanban-col-title">Detected</div><div id="kanban-detected"></div></div>
                    <div><div class="kanban-col-title">Applied</div><div id="kanban-applied"></div></div>
                    <div><div class="kanban-col-title">Follow-up</div><div id="kanban-followup"></div></div>
                    <div><div class="kanban-col-title">Closed</div><div id="kanban-closed"></div></div>
                </div>
            </div>
        </div>

        <!-- ═══ P7: BIO/SALUD ═══ -->
        <div class="card" id="card-bio">
            <div class="card-header" onclick="toggleCard('card-bio')">
                <div class="card-header-left">
                    <div class="card-icon" style="background:rgba(244,63,94,0.12)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#f43f5e" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                    </div>
                    <span class="card-title">Bio / Health</span>
                </div>
                <div class="card-header-right">
                    <span class="card-meta">Weekly</span>
                    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                </div>
            </div>
            <div class="card-body">
                <div class="metric-row" id="bio-metrics"></div>
                <div id="bio-insights"></div>
            </div>
        </div>

        <!-- ═══ AGENT BUS ═══ -->
        <div class="card" id="card-bus">
            <div class="card-header" onclick="toggleCard('card-bus')">
                <div class="card-header-left">
                    <div class="card-icon" style="background:var(--accent-purple-dim)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-purple)" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    </div>
                    <span class="card-title">Agent Bus</span>
                </div>
                <div class="card-header-right">
                    <span class="card-meta" id="bus-meta">--</span>
                    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                </div>
            </div>
            <div class="card-body">
                <div id="bus-pending"></div>
                <div style="margin-top:12px;"><span style="font-size:0.75rem;color:var(--text-muted);font-family:var(--font-data);">RECENT COMPLETED</span></div>
                <div id="bus-completed" style="margin-top:6px;"></div>
            </div>
        </div>

    </div>
</main>

<script>
/* Will be added in Batch 2 */
const API = 'http://95.217.158.7';

/* ─── Card collapse toggle ─── */
function toggleCard(id) {
    document.getElementById(id).classList.toggle('collapsed');
}

/* ─── Tab switching ─── */
document.querySelectorAll('.tab-bar').forEach(bar => {
    bar.addEventListener('click', e => {
        if (!e.target.classList.contains('tab-btn')) return;
        bar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        if (bar.id === 'news-tabs') loadNews(e.target.dataset.src);
    });
});

/* ─── NZ Time updater ─── */
function updateNZTime() {
    const nz = new Date().toLocaleTimeString('en-NZ', { timeZone:'Pacific/Auckland', hour:'2-digit', minute:'2-digit', hour12:false });
    const el = document.getElementById('hdr-nz-time');
    if (el) el.querySelector('span').textContent = nz + ' NZST';
}
updateNZTime();
setInterval(updateNZTime, 10000);

/* ─── Helpers ─── */
function relTime(iso) {
    if (!iso) return '';
    const diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
}
function emptyState(msg) {
    return `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg><div>${msg}</div></div>`;
}
function budgetColor(pct) {
    if (pct < 60) return 'var(--accent-teal)';
    if (pct < 80) return 'var(--accent-amber)';
    return 'var(--accent-coral)';
}
async function api(path, opts) {
    try {
        const r = await fetch(API + path, { cache: 'no-store', ...opts });
        if (!r.ok) return null;
        return await r.json();
    } catch(e) { return null; }
}

/* ═══════════════════════════════════════════════════
   DATA LOADERS
   ═══════════════════════════════════════════════════ */

/* ─── P1: News ─── */
async function loadNews(src) {
    const res = await api('/api/feeds/articles?limit=8');
    const el = document.getElementById('news-list');
    const items = res && res.data ? res.data : (res && res.articles ? res.articles : null);
    if (!items || items.length === 0) {
        el.innerHTML = emptyState('No articles yet');
        document.getElementById('news-count').textContent = '0 articles';
        return;
    }
    let articles = items;
    if (src && src !== 'all') articles = articles.filter(a => (a.feed_name||a.source||'').toLowerCase().includes(src));
    document.getElementById('news-count').textContent = articles.length + ' articles';
    el.innerHTML = articles.map(a => `
        <div class="list-item" style="cursor:pointer;" onclick="window.open('${(a.url||'').replace(/'/g,"\\'")}','_blank')">
            <div class="list-dot" style="background:${a.relevance_score > 7 ? 'var(--accent-teal)' : a.relevance_score > 4 ? 'var(--accent-amber)' : 'var(--text-muted)'}"></div>
            <div class="list-content">
                <div class="list-title"><a href="${a.url||'#'}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--text-primary);text-decoration:none;">${(a.title||'').replace(/\b(AI|NZ|tech|crypto|startup)\b/gi, '<span class="kw">$1</span>')}</a></div>
                <div class="list-sub">${a.feed_name||a.source||'?'} · ${relTime(a.published_at||a.created_at)} ${a.relevance_score ? '· ⭐'+a.relevance_score : ''}</div>
            </div>
        </div>
    `).join('');
}

/* ─── P2: Jobs ─── */
let allJobs = [];
let currentJobFilter = 'all';

async function loadJobs(category) {
    const cat = category || currentJobFilter || 'all';
    currentJobFilter = cat;
    const q = cat !== 'all' ? `&category=${cat}` : '';
    const res = await api(`/api/jobs?limit=50${q}`);
    const el = document.getElementById('jobs-list');
    allJobs = res && res.data ? res.data : [];

    // Aplicar filtro de busqueda local si hay texto
    const searchText = (document.getElementById('jobs-search')?.value || '').toLowerCase();
    let filtered = allJobs;
    if (searchText) filtered = filtered.filter(j => (j.title||'').toLowerCase().includes(searchText) || (j.company||'').toLowerCase().includes(searchText));

    document.getElementById('jobs-count').textContent = filtered.length + ' active';

    if (!filtered.length) {
        el.innerHTML = emptyState('No listings found — try a different filter or search');
        return;
    }

    // Ordenar: saved primero, luego new, applied al final
    const order = { saved: 0, new: 1, applied: 2, rejected: 3 };
    filtered.sort((a, b) => (order[a.status] || 1) - (order[b.status] || 1));

    el.innerHTML = filtered.map(j => {
        const statusIcon = j.status === 'saved' ? '⭐' : j.status === 'applied' ? '✅' : j.status === 'rejected' ? '❌' : '';
        const statusColor = j.status === 'saved' ? 'var(--accent-amber)' : j.status === 'applied' ? 'var(--accent-teal)' : 'var(--accent-blue)';
        const dimClass = j.status === 'applied' || j.status === 'rejected' ? 'opacity:0.5;' : '';
        return `
        <div class="list-item" style="${dimClass}cursor:pointer;" onclick="toggleJobDetail(${j.id})">
            <div class="list-dot" style="background:${statusColor}"></div>
            <div class="list-content" style="flex:1;min-width:0;">
                <div class="list-title" style="display:flex;align-items:center;gap:4px;">
                    ${statusIcon} <a href="${j.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--text-primary);text-decoration:none;">${j.title||'Untitled'}</a>
                </div>
                <div class="list-sub">${j.company||''} ${j.region ? '· '+j.region : ''} ${j.salary ? '· <strong>'+j.salary+'</strong>' : ''} · ${relTime(j.found_at)}</div>
                <div id="job-detail-${j.id}" style="display:none;margin-top:8px;padding:8px;background:var(--bg-glass);border-radius:6px;font-size:0.78rem;">
                    ${j.description ? '<div style="color:var(--text-secondary);margin-bottom:8px;">'+j.description+'</div>' : ''}
                    <div style="display:flex;gap:6px;flex-wrap:wrap;">
                        <button class="tab-btn" onclick="event.stopPropagation();updateJobStatus(${j.id},'saved')" ${j.status==='saved'?'style="background:var(--accent-amber);color:#000;"':''}>⭐ Save</button>
                        <button class="tab-btn" onclick="event.stopPropagation();updateJobStatus(${j.id},'applied')" ${j.status==='applied'?'style="background:var(--accent-teal);color:#000;"':''}>✅ Applied</button>
                        <button class="tab-btn" onclick="event.stopPropagation();updateJobStatus(${j.id},'rejected')">❌ Skip</button>
                        <a href="${j.url}" target="_blank" rel="noopener" class="tab-btn" onclick="event.stopPropagation()" style="text-decoration:none;">🔗 Open</a>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

function toggleJobDetail(id) {
    const el = document.getElementById('job-detail-' + id);
    if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function filterJobs(cat) {
    document.querySelectorAll('#jobs-tabs .tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    loadJobs(cat);
}

async function searchJobs() {
    const query = document.getElementById('jobs-search')?.value?.trim();
    if (!query) { loadJobs(); return; }
    // Buscar en Adzuna y recargar
    await api('/api/jobs/search', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query }) });
    loadJobs('all');
}

async function updateJobStatus(id, status) {
    await fetch(API + '/api/jobs/' + id + '/status', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
    });
    loadJobs();
}

/* ─── P3: Finances ─── */
async function loadFinances() {
    const finRes = await api('/api/finances');
    const budRes = await api('/api/finances/budget');
    const fin = finRes && finRes.data ? finRes.data : finRes;
    const bud = budRes && budRes.data ? budRes.data : budRes;
    const metricsEl = document.getElementById('finance-metrics');
    const barsEl = document.getElementById('budget-bars');
    const expEl = document.getElementById('recent-expenses');
    const txList = Array.isArray(fin) ? fin : [];
    if (txList.length === 0 && !fin) {
        metricsEl.innerHTML = '';
        document.getElementById('finance-balance').textContent = '--';
        barsEl.innerHTML = emptyState('No financial data');
        return;
    }
    const income = txList.filter(t => t.type === 'income').reduce((s,t) => s + Number(t.amount), 0);
    const expense = txList.filter(t => t.type === 'expense').reduce((s,t) => s + Number(t.amount), 0);
    const bal = income - expense;
    document.getElementById('finance-balance').textContent = '$' + bal.toLocaleString() + ' NZD';
    metricsEl.innerHTML = `
        <div class="metric-card"><div class="metric-label">Balance</div><div class="metric-value">$${bal.toLocaleString()}</div><div class="metric-trend neutral">NZD</div></div>
        <div class="metric-card"><div class="metric-label">This Month</div><div class="metric-value">$${expense.toLocaleString()}</div><div class="metric-trend down">spent</div></div>
    `;
    const budgets = Array.isArray(bud) ? bud : (bud && bud.budgets ? bud.budgets : []);
    if (budgets.length) {
        barsEl.innerHTML = budgets.map(b => {
            const pct = Math.min(100, Math.round((b.spent/b.limit)*100));
            return `<div class="progress-item"><div class="progress-label-row"><span class="progress-name">${b.category}</span><span class="progress-pct">${pct}%</span></div><div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${budgetColor(pct)}"></div></div></div>`;
        }).join('');
    } else { barsEl.innerHTML = ''; }
    const recentExp = txList.filter(t => t.type === 'expense').slice(0, 5);
    if (recentExp.length) {
        expEl.innerHTML = '<div style="font-size:0.75rem;color:var(--text-muted);font-family:var(--font-data);margin-bottom:6px;">RECENT</div>' + recentExp.map(e => `<div class="list-item"><div class="list-dot" style="background:var(--accent-coral)"></div><div class="list-content"><div class="list-title">${e.description||e.category||'Expense'}</div><div class="list-sub">$${e.amount} · ${relTime(e.date)}</div></div></div>`).join('');
    }
}

/* ─── P4: Documents ─── */
async function loadDocs() {
    const res = await api('/api/documents');
    const el = document.getElementById('docs-list');
    const docItems = res && res.data ? res.data : (res && res.documents ? res.documents : null);
    if (!docItems || docItems.length === 0) {
        el.innerHTML = emptyState('No documents tracked');
        document.getElementById('docs-count').textContent = '0 tracked';
        return;
    }
    const docs = docItems.sort((a,b) => (a.days_remaining||999)-(b.days_remaining||999));
    document.getElementById('docs-count').textContent = docs.length + ' tracked';
    const typeColors = { passport:'var(--accent-coral)', visa:'var(--accent-blue)', insurance:'var(--accent-teal)', wof:'var(--accent-amber)' };
    el.innerHTML = docs.map(d => {
        const days = d.days_remaining != null ? d.days_remaining : '?';
        const color = days !== '?' && days < 30 ? 'var(--accent-coral)' : days < 90 ? 'var(--accent-amber)' : 'var(--accent-teal)';
        const dtype = d.document_type || d.type || '';
        const dname = d.document_name || d.name || 'Document';
        const bg = typeColors[dtype.toLowerCase()] || 'var(--text-muted)';
        return `<div class="doc-item"><div class="doc-icon" style="background:${bg}22;color:${bg}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg></div><div class="doc-info"><div class="doc-name">${dname}</div><div class="doc-type">${dtype}</div></div><div class="doc-countdown"><div class="doc-days" style="color:${color}">${days}</div><div class="doc-days-label">days left</div></div></div>`;
    }).join('');
}

/* ─── P5: Logistics ─── */
async function loadLogistics() {
    const res = await api('/api/logistics');
    const el = document.getElementById('logistics-timeline');
    const items = res && res.data ? res.data : (res && res.items ? res.items : null);
    if (!items || items.length === 0) {
        el.innerHTML = emptyState('No items in next 48h');
        return;
    }
    el.innerHTML = items.map(it => {
        const dotClass = it.overdue ? 'urgent' : it.priority === 'high' ? 'warn' : '';
        return `<div class="timeline-item"><div class="timeline-dot ${dotClass}"></div><div class="timeline-time">${it.time||''}</div><div class="timeline-title">${it.description||it.title||''}</div></div>`;
    }).join('');
}

/* ─── P6: Opportunities ─── */
async function loadOpps() {
    const res = await api('/api/opportunities');
    ['detected','applied','followup','closed'].forEach(s => document.getElementById('kanban-'+s).innerHTML = '');
    const opps = res && res.data ? res.data : (res && res.opportunities ? res.opportunities : null);
    if (!opps || opps.length === 0) {
        document.getElementById('kanban-detected').innerHTML = '<div class="empty-state" style="padding:12px;">None yet</div>';
        document.getElementById('opps-count').textContent = '0 pipeline';
        return;
    }
    document.getElementById('opps-count').textContent = opps.length + ' pipeline';
    const stageMap = { new:'detected', contacted:'applied', applied:'followup', won:'closed', rejected:'closed' };
    opps.forEach(o => {
        const col = stageMap[(o.status||'new').toLowerCase()] || 'detected';
        const target = document.getElementById('kanban-'+col) || document.getElementById('kanban-detected');
        const link = o.url ? `<a href="${o.url}" target="_blank" rel="noopener" style="color:var(--text-primary);text-decoration:none;">${o.title||o.name||'?'}</a>` : (o.title||o.name||'?');
        const deadline = o.deadline ? `<br><span style="font-size:0.65rem;color:var(--accent-amber);">⏰ ${new Date(o.deadline).toLocaleDateString('en-NZ')}</span>` : '';
        target.innerHTML += `<div class="kanban-card" style="border-color:${o.deadline?'var(--accent-amber)':'var(--accent-teal)');cursor:pointer;">${link}<br><span style="font-size:0.68rem;color:var(--text-muted)">${o.category||o.type||''} ${o.source?'· '+o.source:''}</span>${deadline}</div>`;
    });
}

/* ─── P7: Bio ─── */
async function loadBio() {
    const res = await api('/api/bio');
    const metricsEl = document.getElementById('bio-metrics');
    const insightsEl = document.getElementById('bio-insights');
    const checks = res && res.data ? res.data : null;
    if (!checks || !checks.length) {
        metricsEl.innerHTML = '';
        insightsEl.innerHTML = emptyState('No health data yet');
        return;
    }
    // Calcular promedios de los ultimos checks
    const avgSleep = (checks.reduce((s,c) => s + Number(c.sleep_hours||0), 0) / checks.length).toFixed(1);
    const avgEnergy = (checks.reduce((s,c) => s + Number(c.energy_level||0), 0) / checks.length).toFixed(1);
    const avgMood = (checks.reduce((s,c) => s + Number(c.mood||0), 0) / checks.length).toFixed(1);
    const avgExercise = Math.round(checks.reduce((s,c) => s + Number(c.exercise_minutes||0), 0) / checks.length);
    metricsEl.innerHTML = [
        { l:'Sleep', v:avgSleep, u:'h/night' },
        { l:'Energy', v:avgEnergy, u:'/10' },
        { l:'Exercise', v:avgExercise, u:'min/day' },
        { l:'Mood', v:avgMood, u:'/10' },
    ].map(x => `<div class="metric-card"><div class="metric-label">${x.l}</div><div class="metric-value">${x.v}</div><div class="metric-trend neutral">${x.u}</div></div>`).join('');
    // Mostrar checks recientes como insights
    insightsEl.innerHTML = '<div style="margin-top:12px;font-size:0.75rem;color:var(--text-muted);font-family:var(--font-data);margin-bottom:6px;">RECENT CHECKS</div>' + checks.slice(0,5).map(c => {
        const d = new Date(c.date||c.created_at).toLocaleDateString('en-NZ',{weekday:'short',day:'numeric',month:'short'});
        return `<div class="list-item"><div class="list-dot" style="background:${c.mood>=7?'var(--accent-teal)':c.mood>=4?'var(--accent-amber)':'var(--accent-coral)'}"></div><div class="list-content"><div class="list-title">${d} — Sleep ${c.sleep_hours}h · Energy ${c.energy_level} · Mood ${c.mood}</div><div class="list-sub">${c.notes||''}</div></div></div>`;
    }).join('');
}

/* ─── Agent Bus ─── */
async function loadBus() {
    const data = await api('/api/agent-bus/status');
    const pendEl = document.getElementById('bus-pending');
    const compEl = document.getElementById('bus-completed');
    const hdrBus = document.getElementById('hdr-bus');
    if (!data) {
        pendEl.innerHTML = emptyState('Bus unreachable');
        hdrBus.className = 'status-pill danger';
        hdrBus.innerHTML = 'Bus: <span>offline</span>';
        return;
    }
    const pAnti = data.pending_for_antigravity || [];
    const pCode = data.pending_for_claude_code || [];
    const total = pAnti.length + pCode.length;
    hdrBus.querySelector('span').textContent = total;
    hdrBus.className = 'status-pill ' + (total === 0 ? 'ok' : total < 3 ? 'warn' : 'danger');
    document.getElementById('bus-meta').textContent = `${pAnti.length} antigravity · ${pCode.length} code`;

    const allPending = [
        ...pAnti.map(t => ({...t, agent:'antigravity'})),
        ...pCode.map(t => ({...t, agent:'claude-code'})),
    ];
    if (allPending.length === 0) {
        pendEl.innerHTML = emptyState('All clear — no pending tasks');
    } else {
        pendEl.innerHTML = allPending.map(t => `
            <div class="bus-task">
                <span class="bus-agent ${t.agent}">${t.agent === 'antigravity' ? 'AG' : 'CC'}</span>
                <span class="bus-summary">${t.summary||t.action||'task'}</span>
                <span class="bus-time">${relTime(t.created_at)}</span>
            </div>
        `).join('');
    }

    const completed = (data.recent_completed || []).slice(0,5);
    if (completed.length === 0) {
        compEl.innerHTML = '<div style="font-size:0.78rem;color:var(--text-muted);">No recent completions</div>';
    } else {
        compEl.innerHTML = completed.map(t => {
            const agentClass = (t.from||'').includes('code') ? 'claude-code' : (t.from||'').includes('chat') ? 'claude-chat' : 'antigravity';
            return `<div class="bus-task" style="opacity:0.6"><span class="bus-agent ${agentClass}">${t.from||'?'}</span><span class="bus-summary">${t.summary||''}</span><span class="bus-time">${relTime(t.completed_at)}</span></div>`;
        }).join('');
    }
}

/* ═══ INIT ═══ */
async function refreshAll() {
    await Promise.allSettled([
        loadNews('all'), loadJobs(), loadFinances(),
        loadDocs(), loadLogistics(), loadOpps(), loadBio(), loadBus(),
    ]);
    const rssEl = document.getElementById('hdr-rss');
    rssEl.textContent = 'RSS: ' + new Date().toLocaleTimeString('en-NZ',{timeZone:'Pacific/Auckland',hour:'2-digit',minute:'2-digit',hour12:false});
}
refreshAll();
setInterval(refreshAll, 60000);
setInterval(loadBus, 30000);
</script>
