# ╔══════════════════════════════════════════════════════════════╗
# ║  ULTRA SYSTEM — Docker Compose (PRODUCCION)                ║
# ║                                                              ║
# ║  Variante de produccion con:                                ║
# ║  - restart: always (sobrevive reinicios del VPS)            ║
# ║  - Health checks para ambos servicios                      ║
# ║  - Limites de memoria (512MB engine, 256MB db)             ║
# ║  - Volumen de backup montado                                ║
# ║                                                              ║
# ║  Uso: docker compose -f docker-compose.prod.yml up -d      ║
# ║  Servidor: Hetzner CX23 (2vCPU, 4GB RAM, 40GB)             ║
# ╚══════════════════════════════════════════════════════════════╝

services:

  # ─── BASE DE DATOS (única dependencia externa) ────────────
  db:
    image: postgres:16-alpine
    container_name: ultra_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - backup_data:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ultra_net
    deploy:
      resources:
        limits:
          memory: 256M
    # Logging controlado para no llenar disco
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── ULTRA ENGINE (todo lo demás en uno) ──────────────────
  engine:
    build: ./ultra-engine
    container_name: ultra_engine
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-not_configured}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-not_configured}
      API_KEY: ${API_KEY}
      TZ: ${TZ}
      PORT: 3000
      NODE_ENV: production
    volumes:
      - engine_uploads:/app/uploads
      - backup_data:/backups
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ultra_net
    deploy:
      resources:
        limits:
          memory: 512M
    # Logging controlado para no llenar disco
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  VOLÚMENES PERSISTENTES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
volumes:
  postgres_data:
    driver: local
  engine_uploads:
    driver: local
  backup_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /backups

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  RED INTERNA
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
networks:
  ultra_net:
    driver: bridge
