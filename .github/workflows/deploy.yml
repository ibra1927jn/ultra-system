name: Deploy to Hetzner

on:
  push:
    branches: [main, master]

# Serialize deploys: if a job is already running, queue the new one instead
# of running both in parallel (which previously caused engine container
# overlap kills — see commit history for the wm-phase-2 incidents).
# cancel-in-progress is intentionally false so an in-flight build finishes
# cleanly before the next one starts.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: Run tests
        run: npm test 2>/dev/null || echo "No tests configured"

      - name: Deploy to Hetzner
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "$HETZNER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Deploy
          # Build stage is separate from up so that if the build fails the
          # currently-running engine container is left untouched.
          # Post-deploy health check fails the GitHub Action job loud if the
          # new container does not respond — that way we hear about it
          # instead of silently leaving production in a half-deployed state.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@"$HETZNER_HOST" '
            set -euo pipefail
            cd /root/ultra-system &&
            git config pull.ff only 2>/dev/null || true &&
            git fetch origin master &&
            git reset --hard origin/master &&
            docker compose build engine spacy &&
            docker compose up -d engine spacy &&
            sleep 10 &&
            docker ps --format "table {{.Names}}\t{{.Status}}" &&
            curl -fsS http://localhost:3000/api/health > /dev/null \
              || (echo "POST-DEPLOY HEALTH FAIL — engine /api/health did not respond" && exit 1) &&
            echo "Deploy completed at $(date)"
          '

          # Cleanup
          rm -f ~/.ssh/deploy_key
